[api]
; DeepSeek API anahtariniz -> https://platform.deepseek.com/api_keys
key = sk-YOUR_DEEPSEEK_API_KEY_HERE
base_url = https://api.deepseek.com
model = deepseek-chat
; Cevap suresi siniri (saniye)
timeout = 20
; DeepSeek ceviri icin 1.3 onerir; callout tutarliligi icin 1.0 daha iyi
temperature = 1.0

[translation]
source_lang = Turkish
target_lang = English

[hotkey]
; Cevir + yapistir kisayolu (ornek: f8, f9, ctrl+space)
translate = f8
; F8'i oyuna iletme (oyunda F8 bagliysa true birakin)
suppress = true

[behavior]
; Ceviriden sonra otomatik Enter (chat'i gonder). Guvenli olmasi icin false birakin.
auto_send = false
; Cevirisi bitince orijinal pano icerigini geri yukle
restore_clipboard = true
; Sesli geri bildirim (basari/hata bip)
play_sound = true
